version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stitchd-postgres
    environment:
      POSTGRES_USER: stitchd
      POSTGRES_PASSWORD: stitchd_dev
      POSTGRES_DB: stitchd_db
    ports:
      - '5432:5432'
    volumes:
      - stitchd_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U stitchd']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stitchd-redis
    ports:
      - '6379:6379'
    volumes:
      - stitchd_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  stitchd_postgres_data:
  stitchd_redis_data:
