name: KAZI CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    name: Validate API, Admin, and Mobile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Lint API
        run: yarn workspace @kazi/api lint

      - name: Test API
        run: yarn workspace @kazi/api test
        env:
          NODE_ENV: test
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      - name: Build API
        run: yarn workspace @kazi/api build

      - name: Build Admin
        run: yarn workspace @kazi/admin build

      - name: Install Mobile Dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Analyze Mobile
        working-directory: apps/mobile
        run: flutter analyze

      - name: Test Mobile
        working-directory: apps/mobile
        run: flutter test
