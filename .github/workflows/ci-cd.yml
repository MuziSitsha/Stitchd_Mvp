name: KAZI CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint & Test ───────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint API
        run: yarn workspace @kazi/api lint

      - name: Test API
        run: yarn workspace @kazi/api test
        env:
          NODE_ENV: test
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

  # AWS deployment pipeline intentionally not wired here yet.
  # The client requirement is AWS hosting, and the target architecture is
  # documented in docs/aws-architecture.md before CI/CD automation is added.
